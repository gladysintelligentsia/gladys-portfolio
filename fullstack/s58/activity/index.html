<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript - Reactive DOM with Axios</title>
</head>
<body>

    <h1>Add Post</h1>
    <form id="form-add-post">
        <span>Title</span><br>
        <input type="text" id="txt-title"/><br>
        <span>Body</span><br>
        <!-- Removed type="text" from textarea -->
        <textarea id="txt-body"></textarea><br>
        <button type="submit">Create</button>
    </form>
    <hr>

    <h1>Edit Post</h1>
    <form id="form-edit-post">
        <input type="text" id="txt-edit-id" hidden/><br>
        <span>Title</span><br>
        <input type="text" id="txt-edit-title"/><br>
        <span>Body</span><br>
        <!-- Removed type="text" from textarea -->
        <textarea id="txt-edit-body"></textarea><br>
        
        <!-- CRITICAL CHANGE: Removed "disabled" so the button can be clicked -->
        <button type="submit" id="btn-submit-update">Update</button>
    </form>

    <h1>Posts</h1>
    <button id="delete-all">Delete All</button>
    
    <div id="div-post-entries"></div>

    <!-- Axios Script and your index.js -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./index.js"></script>
</body>
</html>
